name: Daily Trading Scanner

on:
  schedule:
    # 07:30 UTC = 08:30 Lisboa (inverno) / 09:30 Lisboa (verão)
    # Para ajustar ao horário de verão muda para: '30 6 * * 1-5'
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # permite correr manualmente no GitHub

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Fazer checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install yfinance pandas numpy colorama tabulate requests

      - name: Correr scanner e enviar para Telegram
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py --top 10
